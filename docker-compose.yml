networks:
  assistant-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  n8n-data:
  agent-videos:

services:

  # ── Postgres + pgvector ──────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: assistant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./agent-core/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - assistant-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: assistant-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - assistant-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Playwright browser service ───────────────────────────────────────────────
  playwright:
    build:
      context: ./playwright-service
      dockerfile: Dockerfile
    container_name: assistant-playwright
    restart: unless-stopped
    networks:
      - assistant-net
    environment:
      PORT: 3001

  # ── Agent Core ───────────────────────────────────────────────────────────────
  agent-core:
    build:
      context: ./agent-core
      dockerfile: Dockerfile
    container_name: assistant-agent-core
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      PLAYWRIGHT_URL: http://playwright:3001
      N8N_WEBHOOK_BASE_URL: ${N8N_WEBHOOK_BASE_URL}
    ports:
      - "8100:8000"
    volumes:
      - agent-videos:/app/videos
    networks:
      - assistant-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      playwright:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── n8n ──────────────────────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: assistant-n8n
    restart: unless-stopped
    environment:
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: ${N8N_PORT}
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://${N8N_HOST}:${N8N_PORT}/
      GENERIC_TIMEZONE: UTC
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POSTGRESDB_SCHEMA: n8n
    ports:
      - "5679:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - assistant-net
    depends_on:
      postgres:
        condition: service_healthy
