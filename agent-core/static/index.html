<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Assistant</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1c1c1e;
    --surface3: #2c2c2e;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.05);
    --accent: #0a84ff;
    --accent-dim: rgba(10,132,255,0.15);
    --accent-border: rgba(10,132,255,0.3);
    --green: #30d158;
    --red: #ff453a;
    --yellow: #ffd60a;
    --text: #f5f5f7;
    --text-sec: #98989d;
    --text-ter: #3a3a3c;
    --user-bubble: #0a84ff;
    --ai-bubble: #1c1c1e;
    --radius: 14px;
    --sidebar-w: 258px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    height: 100vh;
    display: flex;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: var(--sidebar-w);
    background: rgba(16,16,16,0.94);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    z-index: 100;
  }

  #sidebar-header {
    padding: 18px 16px 14px;
    border-bottom: 1px solid var(--border2);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #sidebar-header .logo {
    width: 30px; height: 30px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  #sidebar-header .logo svg { width: 17px; height: 17px; fill: #fff; }
  #sidebar-header h1 { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
  #sidebar-header p { font-size: 11px; color: var(--text-sec); display: flex; align-items: center; gap: 4px; margin-top: 2px; }

  #new-chat-btn {
    margin: 11px 11px 8px;
    padding: 8px 13px;
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid var(--accent-border);
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 7px;
    transition: all 0.2s;
    font-family: inherit;
  }
  #new-chat-btn:hover { background: rgba(10,132,255,0.22); border-color: rgba(10,132,255,0.45); }
  #new-chat-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

  #sidebar-tabs {
    display: flex;
    margin: 0 11px 5px;
    gap: 2px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 3px;
  }

  .stab {
    flex: 1;
    padding: 5px 8px;
    background: none;
    border: none;
    color: var(--text-sec);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.18s;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .stab svg { width: 12px; height: 12px; flex-shrink: 0; }
  .stab.active { background: var(--surface3); color: var(--text); }

  #sidebar-content { flex: 1; overflow-y: auto; padding: 4px 0; }

  .session-item {
    padding: 8px 13px;
    cursor: pointer;
    border-radius: 9px;
    margin: 1px 7px;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .session-item:hover { background: var(--surface2); }
  .session-item.active { background: var(--surface2); }
  .session-item .si-icon { color: var(--text-ter); flex-shrink: 0; }
  .session-item .si-icon svg { width: 13px; height: 13px; display: block; }
  .session-item .si-text { flex: 1; min-width: 0; }
  .session-item .si-title { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
  .session-item .si-time { font-size: 11px; color: var(--text-sec); margin-top: 1px; }

  .memory-item {
    padding: 9px 13px;
    margin: 2px 7px;
    border-radius: 9px;
    background: var(--surface2);
    margin-bottom: 4px;
    font-size: 12px;
    color: var(--text-sec);
    line-height: 1.5;
    border-left: 2px solid var(--accent);
  }
  .memory-item .mc { font-size: 10px; color: var(--accent); margin-bottom: 2px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }

  #memory-search {
    margin: 8px 11px;
    padding: 7px 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
    color: var(--text);
    font-size: 12px;
    width: calc(100% - 22px);
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  #memory-search:focus { border-color: rgba(10,132,255,0.45); }

  #sidebar-footer {
    padding: 11px;
    border-top: 1px solid var(--border2);
  }
  #sidebar-footer a {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
    color: var(--text-sec);
    font-size: 12px;
    font-weight: 500;
    text-decoration: none;
    transition: all 0.2s;
  }
  #sidebar-footer a svg { width: 13px; height: 13px; flex-shrink: 0; }
  #sidebar-footer a:hover { color: var(--text); border-color: rgba(255,255,255,0.14); background: var(--surface3); }

  /* Settings Modal */
  #settings-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    z-index: 9000;
    align-items: center; justify-content: center;
  }
  #settings-overlay.open { display: flex; }
  #settings-box {
    background: #1c1c1e;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 28px;
    width: 380px;
    max-width: 95vw;
    box-shadow: 0 32px 80px rgba(0,0,0,0.7);
  }
  #settings-box h2 { font-size: 17px; font-weight: 600; margin-bottom: 22px; display: flex; justify-content: space-between; align-items: center; letter-spacing: -0.015em; }
  #settings-box .settings-label { font-size: 12px; color: var(--text-sec); display: block; margin-bottom: 7px; font-weight: 500; }
  #settings-key-input {
    width: 100%; padding: 10px 13px;
    background: var(--surface3); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-size: 13px; outline: none; margin-bottom: 14px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    transition: border-color 0.2s;
  }
  #settings-key-input:focus { border-color: rgba(10,132,255,0.55); }
  #settings-save-btn {
    width: 100%; padding: 11px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 10px;
    font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
    transition: opacity 0.2s;
  }
  #settings-save-btn:hover { opacity: 0.86; }
  .settings-close {
    cursor: pointer; color: var(--text-sec);
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--surface3);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .settings-close:hover { background: rgba(255,255,255,0.1); color: var(--text); }
  .settings-close svg { width: 11px; height: 11px; }

  /* ── Main ── */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  #topbar {
    background: rgba(10,10,10,0.8);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-bottom: 1px solid var(--border2);
    padding: 9px 18px;
    display: flex;
    align-items: center;
    gap: 9px;
    flex-shrink: 0;
  }

  #menu-btn {
    display: none; background: none; border: none;
    color: var(--text-sec); cursor: pointer; padding: 5px;
    border-radius: 7px; line-height: 0;
  }
  #menu-btn:hover { background: var(--surface2); }
  #menu-btn svg { width: 17px; height: 17px; display: block; }

  #session-label { font-size: 13px; font-weight: 500; flex: 1; color: var(--text-sec); }

  #provider-select {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 5px 10px; border-radius: 8px;
    font-size: 12px; outline: none; cursor: pointer; font-family: inherit;
  }

  .topbar-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-sec); padding: 5px 11px; border-radius: 8px;
    font-size: 12px; font-weight: 500; cursor: pointer;
    transition: all 0.18s; text-decoration: none;
    display: flex; align-items: center; gap: 5px; font-family: inherit;
  }
  .topbar-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
  .topbar-btn:hover { background: var(--surface3); color: var(--text); border-color: rgba(255,255,255,0.13); }

  /* ── Quick actions ── */
  #quick-actions {
    display: flex; gap: 6px;
    padding: 9px 18px;
    background: rgba(10,10,10,0.5);
    border-bottom: 1px solid var(--border2);
    overflow-x: auto; flex-shrink: 0; scrollbar-width: none;
  }
  #quick-actions::-webkit-scrollbar { display: none; }

  .qa-btn {
    padding: 5px 13px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; color: var(--text-sec);
    font-size: 12px; font-weight: 500; cursor: pointer;
    white-space: nowrap; transition: all 0.18s;
    display: flex; align-items: center; gap: 5px;
    flex-shrink: 0; font-family: inherit;
  }
  .qa-btn svg { width: 11px; height: 11px; flex-shrink: 0; }
  .qa-btn:hover { background: var(--surface3); color: var(--text); border-color: rgba(255,255,255,0.13); }

  /* ── Chat area ── */
  #chat-area {
    flex: 1; overflow-y: auto;
    padding: 28px 20px;
    display: flex; flex-direction: column; gap: 18px;
    scroll-behavior: smooth;
  }

  #empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 13px; text-align: center; padding: 40px;
  }
  #empty-state .es-icon {
    width: 58px; height: 58px;
    background: var(--surface2); border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 4px;
  }
  #empty-state .es-icon svg { width: 28px; height: 28px; color: var(--text-sec); }
  #empty-state h2 { font-size: 22px; color: var(--text); font-weight: 600; letter-spacing: -0.02em; }
  #empty-state p { font-size: 14px; max-width: 350px; line-height: 1.65; color: var(--text-sec); }

  .message { display: flex; gap: 10px; max-width: 800px; width: 100%; }
  .message.user { flex-direction: row-reverse; margin-left: auto; }

  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 3px;
  }
  .msg-avatar svg { width: 14px; height: 14px; }
  .message.user .msg-avatar { background: var(--accent); }
  .message.user .msg-avatar svg { color: #fff; }
  .message.assistant .msg-avatar { background: var(--surface3); }
  .message.assistant .msg-avatar svg { color: var(--text-sec); }

  .msg-body { flex: 1; min-width: 0; }

  .msg-bubble {
    padding: 11px 15px; border-radius: 18px;
    line-height: 1.65; font-size: 14px; word-wrap: break-word;
  }
  .message.user .msg-bubble {
    background: var(--accent); border-bottom-right-radius: 5px; color: #fff;
  }
  .message.assistant .msg-bubble {
    background: var(--ai-bubble); border: 1px solid var(--border);
    border-bottom-left-radius: 5px;
  }

  .msg-bubble p { margin-bottom: 8px; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble code {
    background: rgba(255,255,255,0.1); padding: 2px 6px;
    border-radius: 4px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12.5px;
  }
  .message.user .msg-bubble code { background: rgba(0,0,0,0.2); }
  .msg-bubble pre {
    background: rgba(0,0,0,0.35); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px; overflow-x: auto; margin: 8px 0;
  }
  .msg-bubble pre code { background: none; padding: 0; }
  .msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin: 6px 0; }
  .msg-bubble li { margin-bottom: 4px; }
  .msg-bubble strong { color: #fff; font-weight: 600; }
  .msg-bubble h1,.msg-bubble h2,.msg-bubble h3 { margin: 10px 0 6px; color: #fff; letter-spacing: -0.01em; }
  .msg-bubble a { color: #64b5f6; text-decoration: underline; }
  .msg-bubble table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
  .msg-bubble th, .msg-bubble td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
  .msg-bubble th { background: var(--surface3); }

  .msg-time { font-size: 11px; color: var(--text-ter); margin-top: 5px; padding: 0 4px; }
  .message.user .msg-time { text-align: right; }

  .tool-call {
    background: rgba(10,132,255,0.06); border: 1px solid rgba(10,132,255,0.14);
    border-radius: 9px; padding: 7px 11px; margin: 4px 0;
    font-size: 12px; display: flex; align-items: center; gap: 7px; color: var(--accent);
  }
  .tool-call svg { width: 11px; height: 11px; flex-shrink: 0; }
  .tool-call .tc-name { font-weight: 600; }
  .tool-call .tc-args { color: var(--text-sec); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }
  .tool-call.done { color: var(--text-sec); border-color: var(--border); background: transparent; }
  .tool-call.error { color: var(--red); border-color: rgba(255,69,58,0.25); background: rgba(255,69,58,0.05); }

  .typing-indicator { display: flex; gap: 5px; align-items: center; padding: 10px 14px; }
  .typing-dot { width: 6px; height: 6px; background: var(--text-ter); border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

  /* ── Input area ── */
  #input-area { padding: 12px 18px 18px; flex-shrink: 0; }

  #input-wrapper {
    display: flex; align-items: flex-end; gap: 9px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 18px; padding: 9px 9px 9px 15px;
    transition: border-color 0.2s;
  }
  #input-wrapper:focus-within { border-color: rgba(10,132,255,0.38); }

  #msg-input {
    flex: 1; background: none; border: none; color: var(--text);
    font-size: 14px; outline: none; resize: none;
    max-height: 160px; min-height: 24px; line-height: 1.5; font-family: inherit;
  }
  #msg-input::placeholder { color: var(--text-ter); }

  #send-btn {
    width: 34px; height: 34px; background: var(--accent); border: none;
    border-radius: 10px; color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.2s; flex-shrink: 0;
  }
  #send-btn svg { width: 15px; height: 15px; }
  #send-btn:hover { opacity: 0.86; }
  #send-btn:disabled { opacity: 0.28; cursor: not-allowed; }

  #input-hint { font-size: 11px; color: var(--text-ter); margin-top: 6px; text-align: center; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.09); border-radius: 4px; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 22px; right: 22px;
    background: rgba(44,44,46,0.95); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 16px; font-size: 13px;
    color: var(--text); z-index: 9999; opacity: 0;
    transform: translateY(8px); transition: all 0.28s cubic-bezier(0.4,0,0.2,1);
    pointer-events: none; max-width: 280px;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.success { border-color: rgba(48,209,88,0.35); color: var(--green); }
  #toast.error { border-color: rgba(255,69,58,0.35); color: var(--red); }

  /* ── Mobile ── */
  @media (max-width: 700px) {
    #sidebar { position: fixed; top: 0; left: 0; height: 100%; transform: translateX(-100%); }
    #sidebar.open { transform: translateX(0); }
    #menu-btn { display: flex; }
    #chat-area { padding: 16px 12px; }
    #input-area { padding: 10px 12px 14px; }
    .message { max-width: 100%; }
  }

  .section-label {
    font-size: 11px; color: var(--text-ter);
    text-transform: uppercase; letter-spacing: 0.07em;
    padding: 10px 13px 4px; font-weight: 600;
  }

  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); display: inline-block;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
</style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="white"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.38-1 1.73V7h3a3 3 0 0 1 3 3v1a2 2 0 0 1 2 2 2 2 0 0 1-2 2v1a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3v-1a2 2 0 0 1-2-2 2 2 0 0 1 2-2v-1a3 3 0 0 1 3-3h3V5.73c-.6-.35-1-.99-1-1.73a2 2 0 0 1 2-2zm-2 9a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zm4 0a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z"/></svg>
    </div>
    <div>
      <h1>Personal Assistant</h1>
      <p><span class="status-dot" id="status-dot"></span><span id="status-text">Connecting…</span></p>
    </div>
  </div>

  <button id="new-chat-btn" onclick="newChat()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    New Chat
  </button>

  <div id="sidebar-tabs">
    <button class="stab active" onclick="switchTab('sessions', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Chats
    </button>
    <button class="stab" onclick="switchTab('memory', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3M12 17h.01"/></svg>
      Memory
    </button>
  </div>

  <div id="sidebar-content">
    <div id="tab-sessions">
      <div class="section-label">Recent</div>
      <div id="sessions-list"><div style="padding:14px 13px;font-size:12px;color:var(--text-ter)">Loading…</div></div>
    </div>
    <div id="tab-memory" style="display:none">
      <input id="memory-search" placeholder="Search memories…" oninput="searchMemory(this.value)">
      <div id="memory-list"><div style="padding:14px 13px;font-size:12px;color:var(--text-ter)">Loading…</div></div>
    </div>
  </div>

  <div id="sidebar-footer">
    <a href="/admin" target="_blank">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Admin Panel
    </a>
  </div>
</div>

<!-- Main -->
<div id="main">
  <div id="topbar">
    <button id="menu-btn" onclick="toggleSidebar()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
    <div id="session-label">New Chat</div>
    <select id="provider-select" onchange="setProvider(this.value)">
      <option value="">Default Provider</option>
    </select>
    <button class="topbar-btn" onclick="newChat()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      New Chat
    </button>
    <button class="topbar-btn" onclick="openSettings()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="15" r="5"/><path d="M13 10l8-8M21 2l-3 3M15 8l3 3"/></svg>
      Settings
    </button>
  </div>

  <div id="quick-actions">
    <button class="qa-btn" onclick="quickAsk('Give me a full system status report of all my servers and services')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><rect x="2" y="3" width="20" height="5" rx="2"/><rect x="2" y="11" width="20" height="5" rx="2"/></svg>
      Server Status
    </button>
    <button class="qa-btn" onclick="quickAsk('Check all my Docker containers for available updates and list them')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12c-.7-2.7-3-4.5-5.5-4.5h-1"/><rect x="2" y="8" width="16" height="8" rx="2"/><path d="M6 8V6M10 8V6M14 8V6"/></svg>
      Docker Updates
    </button>
    <button class="qa-btn" onclick="quickAsk('Run a security check on all registered servers — failed logins, open ports, and firewall status')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Security Check
    </button>
    <button class="qa-btn" onclick="quickAsk('What are my TrueNAS pool statuses, any alerts, and disk health?')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/></svg>
      TrueNAS
    </button>
    <button class="qa-btn" onclick="quickAsk('Give me a morning briefing — weather, any server alerts, and what I should focus on today')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      Morning Briefing
    </button>
    <button class="qa-btn" onclick="quickAsk('Research trending YouTube video ideas for my channel and suggest 5 great topics')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      YouTube Ideas
    </button>
    <button class="qa-btn" onclick="quickAsk('What smart home devices are on right now and what is the current state of my home?')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
      Home Status
    </button>
    <button class="qa-btn" onclick="quickAsk('Check my recent emails and summarize anything important')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><path d="M22 6l-10 7L2 6"/></svg>
      Check Email
    </button>
  </div>

  <div id="chat-area">
    <div id="empty-state">
      <div class="es-icon">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.38-1 1.73V7h3a3 3 0 0 1 3 3v1a2 2 0 0 1 2 2 2 2 0 0 1-2 2v1a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3v-1a2 2 0 0 1-2-2 2 2 0 0 1 2-2v-1a3 3 0 0 1 3-3h3V5.73c-.6-.35-1-.99-1-1.73a2 2 0 0 1 2-2zm-2 9a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zm4 0a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z"/></svg>
      </div>
      <h2>How can I help you today?</h2>
      <p>Your personal AI assistant — homelab manager, smart home controller, content creator, and more.</p>
    </div>
  </div>

  <div id="input-area">
    <div id="input-wrapper">
      <textarea id="msg-input" placeholder="Ask me anything…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
      </button>
    </div>
    <div id="input-hint">Return to send · Shift+Return for new line</div>
  </div>
</div>

<div id="toast"></div>

<!-- Settings Modal -->
<div id="settings-overlay">
  <div id="settings-box">
    <h2>Settings <span class="settings-close" onclick="closeSettings()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></span></h2>
    <span class="settings-label">API Secret Key</span>
    <input id="settings-key-input" type="password" placeholder="Enter your AGENT_SECRET_KEY">
    <button id="settings-save-btn" onclick="saveSettingsKey()">Save</button>
  </div>
</div>

<script>
const API = '';
let apiKey = localStorage.getItem('agent_key') || '';
let currentSession = null;
let isStreaming = false;
let currentProvider = '';
let memorySearchTimeout = null;

document.addEventListener('DOMContentLoaded', () => {
  if (!apiKey) openSettings();
  checkHealth();
  loadSessions();
  loadProviders();
  setInterval(checkHealth, 30000);
});

function openSettings() {
  document.getElementById('settings-key-input').value = apiKey;
  document.getElementById('settings-overlay').classList.add('open');
}

function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
}

function saveSettingsKey() {
  apiKey = document.getElementById('settings-key-input').value.trim();
  localStorage.setItem('agent_key', apiKey);
  closeSettings();
  showToast('API key saved', 'success');
}

function saveKey(val) {
  apiKey = val.trim();
  localStorage.setItem('agent_key', apiKey);
}

function headers() {
  return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` };
}

async function checkHealth() {
  try {
    const r = await fetch(`${API}/health`);
    const ok = r.ok;
    document.getElementById('status-dot').style.background = ok ? 'var(--green)' : 'var(--red)';
    document.getElementById('status-text').textContent = ok ? 'Online' : 'Offline';
  } catch {
    document.getElementById('status-dot').style.background = 'var(--red)';
    document.getElementById('status-text').textContent = 'Offline';
  }
}

async function loadProviders() {
  if (!apiKey) return;
  try {
    const r = await fetch(`${API}/providers`, { headers: headers() });
    if (!r.ok) return;
    const data = await r.json();
    const sel = document.getElementById('provider-select');
    sel.innerHTML = '<option value="">Default Provider</option>';
    (data.providers || []).forEach(p => {
      if (p.configured) {
        const o = document.createElement('option');
        o.value = p.name;
        o.textContent = p.name.charAt(0).toUpperCase() + p.name.slice(1);
        sel.appendChild(o);
      }
    });
  } catch {}
}

function setProvider(val) { currentProvider = val; }

async function loadSessions() {
  if (!apiKey) { document.getElementById('sessions-list').innerHTML = '<div style="padding:14px 13px;font-size:12px;color:var(--text-ter)">Enter your API key to start</div>'; return; }
  try {
    const r = await fetch(`${API}/sessions`, { headers: headers() });
    if (!r.ok) return;
    const data = await r.json();
    const list = document.getElementById('sessions-list');
    const sessions = data.sessions || [];
    if (!sessions.length) { list.innerHTML = '<div style="padding:14px 13px;font-size:12px;color:var(--text-ter)">No sessions yet. Start chatting!</div>'; return; }
    list.innerHTML = sessions.slice(0, 30).map(s => `
      <div class="session-item ${s.session_id === currentSession ? 'active' : ''}" onclick="loadSession('${s.session_id}')">
        <span class="si-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
        <div class="si-text">
          <div class="si-title">${escHtml(s.preview || s.session_id)}</div>
          <div class="si-time">${formatTime(s.updated_at)}</div>
        </div>
      </div>`).join('');
  } catch {}
}

async function loadSession(id) {
  currentSession = id;
  document.getElementById('empty-state')?.remove();
  document.getElementById('session-label').textContent = id;
  clearChat();
  document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.session-item').forEach(el => { if (el.onclick.toString().includes(id)) el.classList.add('active'); });
  try {
    const r = await fetch(`${API}/sessions/${id}`, { headers: headers() });
    if (!r.ok) return;
    const data = await r.json();
    (data.messages || []).forEach(m => {
      if (m.role === 'user') appendMessage('user', m.content);
      else if (m.role === 'assistant' && m.content) appendMessage('assistant', m.content);
    });
    scrollBottom();
  } catch {}
  if (window.innerWidth < 700) document.getElementById('sidebar').classList.remove('open');
}

function newChat() {
  currentSession = 'session-' + Date.now().toString(36);
  clearChat();
  document.getElementById('session-label').textContent = 'New Chat';
  const es = document.createElement('div');
  es.id = 'empty-state';
  es.innerHTML = `<div class="es-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.38-1 1.73V7h3a3 3 0 0 1 3 3v1a2 2 0 0 1 2 2 2 2 0 0 1-2 2v1a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3v-1a2 2 0 0 1-2-2 2 2 0 0 1 2-2v-1a3 3 0 0 1 3-3h3V5.73c-.6-.35-1-.99-1-1.73a2 2 0 0 1 2-2zm-2 9a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zm4 0a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z"/></svg></div><h2>How can I help you today?</h2><p>Your personal AI assistant — homelab manager, smart home controller, content creator, and more.</p>`;
  document.getElementById('chat-area').appendChild(es);
  document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
  if (window.innerWidth < 700) document.getElementById('sidebar').classList.remove('open');
}

function clearChat() {
  document.getElementById('chat-area').innerHTML = '';
}

async function loadMemory(q = '') {
  if (!apiKey) return;
  try {
    const url = q ? `${API}/memory/search?q=${encodeURIComponent(q)}&limit=20` : `${API}/memory/search?q=general&limit=20`;
    const r = await fetch(url, { headers: headers() });
    if (!r.ok) return;
    const data = await r.json();
    const list = document.getElementById('memory-list');
    const mems = data.results || [];
    if (!mems.length) { list.innerHTML = '<div style="padding:14px 13px;font-size:12px;color:var(--text-ter)">No memories found.</div>'; return; }
    list.innerHTML = mems.map(m => `
      <div class="memory-item">
        <div class="mc">${escHtml(m.category || 'general')}</div>
        ${escHtml(m.content)}
      </div>`).join('');
  } catch {}
}

function searchMemory(q) {
  clearTimeout(memorySearchTimeout);
  memorySearchTimeout = setTimeout(() => loadMemory(q), 400);
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || isStreaming) return;
  if (!apiKey) { showToast('Please enter your API secret key in Settings', 'error'); return; }

  document.getElementById('empty-state')?.remove();
  input.value = '';
  input.style.height = 'auto';

  if (!currentSession) currentSession = 'session-' + Date.now().toString(36);

  appendMessage('user', text);
  scrollBottom();

  const thinkingId = appendThinking();
  isStreaming = true;
  document.getElementById('send-btn').disabled = true;

  try {
    const body = { message: text, session_id: currentSession };
    if (currentProvider) body.provider = currentProvider;

    const r = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify(body),
    });

    removeThinking(thinkingId);

    if (!r.ok) {
      const err = await r.text();
      appendMessage('assistant', `Error ${r.status}: ${err}`);
    } else {
      const data = await r.json();
      appendMessage('assistant', data.response || '(empty response)');
      currentSession = data.session_id || currentSession;
      document.getElementById('session-label').textContent = currentSession;
    }
  } catch (e) {
    removeThinking(thinkingId);
    appendMessage('assistant', `Connection error: ${e.message}`);
  }

  isStreaming = false;
  document.getElementById('send-btn').disabled = false;
  scrollBottom();
  loadSessions();
}

function quickAsk(text) {
  document.getElementById('msg-input').value = text;
  sendMessage();
}

function appendMessage(role, content) {
  const ca = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const userIcon = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0 2c-5.33 0-8 2.67-8 4v1h16v-1c0-1.33-2.67-4-8-4z"/></svg>`;
  const botIcon = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.38-1 1.73V7h3a3 3 0 0 1 3 3v1a2 2 0 0 1 2 2 2 2 0 0 1-2 2v1a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3v-1a2 2 0 0 1-2-2 2 2 0 0 1 2-2v-1a3 3 0 0 1 3-3h3V5.73c-.6-.35-1-.99-1-1.73a2 2 0 0 1 2-2zm-2 9a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zm4 0a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z"/></svg>`;
  div.innerHTML = `
    <div class="msg-avatar">${role === 'user' ? userIcon : botIcon}</div>
    <div class="msg-body">
      <div class="msg-bubble">${renderMarkdown(content)}</div>
      <div class="msg-time">${time}</div>
    </div>`;
  ca.appendChild(div);
  return div;
}

function appendThinking() {
  const ca = document.getElementById('chat-area');
  const id = 'thinking-' + Date.now();
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.id = id;
  const botIcon = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.38-1 1.73V7h3a3 3 0 0 1 3 3v1a2 2 0 0 1 2 2 2 2 0 0 1-2 2v1a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3v-1a2 2 0 0 1-2-2 2 2 0 0 1 2-2v-1a3 3 0 0 1 3-3h3V5.73c-.6-.35-1-.99-1-1.73a2 2 0 0 1 2-2zm-2 9a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zm4 0a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z"/></svg>`;
  div.innerHTML = `
    <div class="msg-avatar">${botIcon}</div>
    <div class="msg-body">
      <div class="msg-bubble">
        <div class="typing-indicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>
    </div>`;
  ca.appendChild(div);
  scrollBottom();
  return id;
}

function removeThinking(id) { document.getElementById(id)?.remove(); }

function scrollBottom() {
  const ca = document.getElementById('chat-area');
  ca.scrollTop = ca.scrollHeight;
}

function renderMarkdown(text) {
  if (!text) return '';
  let html = escHtml(text);
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${code.trim()}</code></pre>`);
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  html = html.replace(/^[*\-] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  const lines = html.split('\n');
  const out = [];
  let inPre = false;
  for (const line of lines) {
    if (line.startsWith('<pre>')) inPre = true;
    if (line.startsWith('</pre>')) inPre = false;
    if (!inPre && line.trim() === '') out.push('');
    else out.push(line);
  }
  html = out.join('\n');
  html = html.replace(/\n{2,}/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');
  if (!html.startsWith('<h') && !html.startsWith('<pre>') && !html.startsWith('<ul>')) {
    html = `<p>${html}</p>`;
  }
  return html;
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>').replace(/"/g,'"');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function switchTab(tab, btn) {
  document.querySelectorAll('.stab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-sessions').style.display = tab === 'sessions' ? '' : 'none';
  document.getElementById('tab-memory').style.display = tab === 'memory' ? '' : 'none';
  if (tab === 'memory') loadMemory();
}

function formatTime(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return 'just now';
    if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
    if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
    return d.toLocaleDateString();
  } catch { return ''; }
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show ${type}`;
  setTimeout(() => t.className = '', 3000);
}
</script>
</body>
</html>
